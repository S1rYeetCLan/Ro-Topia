<!DOCTYPE html>
<html>
<head>
    <style>
        body { font-family: Arial, sans-serif; background-color: #e3e3e3; margin: 0; padding: 0; }
        
        /* HEADER & NAV */
        .header { background: linear-gradient(to bottom, #72b0ff, #2989ff); padding: 10px; border-bottom: 3px solid #004488; text-align: center; }
        .logo { color: white; font-size: 32px; font-weight: bold; text-shadow: 2px 2px 0 #ff0000, 3px 3px 0 #000; }
        .nav-bar { background: rgba(0,0,0,0.15); display: flex; justify-content: center; gap: 15px; padding: 5px 0; }
        .nav-link { color: white; font-size: 11px; text-decoration: none; text-transform: uppercase; cursor: pointer; }

        /* MAIN CONTAINER */
        #main-site { display: none; max-width: 1100px; margin: 20px auto; padding: 0 10px; }
        .layout-grid { display: grid; grid-template-columns: 220px 1fr 200px; gap: 20px; }

        /* BOX STYLE */
        .white-box { background: white; border: 1px solid #ccc; padding: 10px; margin-bottom: 15px; text-align: left; }
        .box-title { background: #f2f2f2; border-bottom: 1px solid #ccc; margin: -10px -10px 10px -10px; padding: 5px 10px; font-size: 13px; font-weight: bold; }

        /* LEFT: AVATAR */
        .avatar-preview { width: 100%; height: 220px; background: #c5d9f1; border: 1px solid #999; margin-bottom: 10px; display: flex; align-items: center; justify-content: center; }
        .noob { width: 50px; height: 70px; background: #004488; position: relative; }
        .noob-head { width: 25px; height: 25px; background: #ffff00; position: absolute; top: -30px; left: 12px; border-radius: 4px; }
        .side-link { color: #0055aa; text-decoration: none; font-size: 13px; display: block; padding: 5px 0; border-bottom: 1px solid #eee; }

        /* MIDDLE: GAMES */
        .game-card { border: 1px solid #eee; padding: 5px; margin-bottom: 10px; cursor: pointer; }
        .game-thumb { width: 100%; height: 90px; background: #ddd; margin-bottom: 5px; }
        .game-title { font-size: 12px; color: #0055aa; font-weight: bold; }

        /* RIGHT: FRIENDS */
        .friend-row { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid #f2f2f2; }
        .friend-head { width: 35px; height: 35px; background: #eee; border: 1px solid #ccc; }
        .friend-name { font-size: 12px; color: #0055aa; }

        /* LOGIN */
        #login-page { padding: 100px 0; text-align: center; }
        .play-btn { background: #00aa00; color: white; padding: 15px 40px; border: none; font-weight: bold; cursor: pointer; border-bottom: 4px solid #007700; }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo">RO-TOPIA</div>
        <div class="nav-bar">
            <span class="nav-link">Home</span><span class="nav-link">Games</span><span class="nav-link">Catalog</span><span class="nav-link">Develop</span>
        </div>
    </div>

    <div id="login-page">
        <div style="background:white; border:1px solid #ccc; display:inline-block; padding:30px;">
            <h3>Sign In</h3>
            <input type="text" id="user-input" placeholder="Username" style="padding:10px; width:200px;"><br><br>
            <button onclick="login()" class="play-btn">PLAY NOW</button>
        </div>
    </div>

    <div id="main-site">
        <div class="layout-grid">
            
            <div class="column">
                <div class="white-box">
                    <div class="avatar-preview"><div class="noob"><div class="noob-head"></div></div></div>
                    <b id="player-name" style="color:#2989ff;">User</b>
                </div>
                <div class="white-box">
                    <div class="box-title">Settings</div>
                    <a href="#" class="side-link">Customize Avatar</a>
                    <a href="#" class="side-link">Inventory</a>
                    <a href="#" class="side-link">Account Info</a>
                </div>
            </div>

            <div class="column">
                <div class="white-box">
                    <div class="box-title">Popular Games</div>
                    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                        <div class="game-card"><div class="game-thumb" style="background:#72b0ff;"></div><div class="game-title">Ro-Topia RP</div></div>
                        <div class="game-card"><div class="game-thumb" style="background:#ffaa00;"></div><div class="game-title">Pizza place</div></div>
                        <div class="game-card"><div class="game-thumb" style="background:#44aa44;"></div><div class="game-title">Drop Tower</div></div>
                        <div class="game-card"><div class="game-thumb" style="background:#555;"></div><div class="game-title">Catalog Heaven</div></div>
                    </div>
                </div>
            </div>

            <div class="column">
                <div class="white-box">
                    <div class="box-title">Friends (Online)</div>
                    <div class="friend-row"><div class="friend-head"></div><div class="friend-name">Ro-Topia</div></div>
                    <div class="friend-row"><div class="friend-head"></div><div class="friend-name">Build_Master</div></div>
                    <div class="friend-row"><div class="friend-head"></div><div class="friend-name">Noob_Player</div></div>
                </div>
            </div>

        </div>
    </div>

    <script>
        function login() {
            var name = document.getElementById('user-input').value;
            if(name.length >= 2) {
                document.getElementById('login-page').style.display = 'none';
                document.getElementById('main-site').style.display = 'block';
                document.getElementById('player-name').innerText = name;
            } else {
                alert("Enter a username!");
            }
        }
    </script>
</body>
</html>
